<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DearGift Replica - Món Quà Hoàn Hảo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p class="load-status">Đang khởi tạo ma trận hạt...</p>
    </div>

    <div id="hold-container">
        <svg class="progress-ring" width="120" height="120">
            <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.1)" stroke-width="6" fill="transparent" r="52" cx="60" cy="60"/>
            <circle id="hold-progress" class="progress-ring__circle" stroke="#ff4081" stroke-width="6" fill="transparent" r="52" cx="60" cy="60"/>
        </svg>
        <button id="hold-btn" 
                onmousedown="onHoldStart()" 
                onmouseup="onHoldEnd()" 
                ontouchstart="onHoldStart()" 
                ontouchend="onHoldEnd()">
            GIỮ
        </button>
    </div>

    <button id="next-stage-btn" class="hidden-element" onclick="goToNextStage()">TIẾP TỤC ✨</button>

    <div id="mini-letter-btn" class="hidden-element" onclick="openCentralLetter()">
        <div class="mini-envelope">✉</div>
    </div>

    <div id="canvas-container"></div>

    <div id="letter-overlay" class="hidden-element">
        <div class="vintage-letter">
            <div class="wax-seal">♥</div>
            <h2 class="letter-title">Gửi Người Anh Thương</h2>
            <div id="typewriter-text" class="letter-body"></div>
            <img src="images/ketbai.jpg" alt="Kỷ niệm lãng mạn" id="final-love-photo" class="hidden-opacity">
            <button class="close-btn" onclick="closeLetter()">Đóng Thư 🌸</button>
        </div>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="audio/nhacnen.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="script.js"></script>
</body>
</html>
